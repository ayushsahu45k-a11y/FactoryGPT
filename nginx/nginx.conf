worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Avoid scanning fingerprinting packages

    # Gzip Compression tuning
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Non-root temp paths security setting
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Gateway upstream registries
    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    # 1. HTTP Server - Auto-redirects from port 8080 (Mapped from host port 80) to HTTPS (8443 / 443)
    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        # Health endpoint responding on unsecured channels
        location /healthz {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status": "online", "proxy": "nginx_gateway"}';
        }

        # Global permanent redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS Server - Non-privileged port 8443 (Mapped from host port 443)
    server {
        listen 8443 ssl default_server;
        listen [::]:8443 ssl default_server;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/factorygpt.crt;
        ssl_certificate_key /etc/nginx/ssl/factorygpt.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        
        # Session parameters (Cache speed and session timeouts)
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Hardened Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Document root pointing to static web assets
        root /usr/share/nginx/html;
        index index.html;

        # Static assets cache optimizations (Leverage browser cache)
        location ~* \.(?:css|js|woff2?|svg|gif|png|jpe?g|ico)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # Pass active web routes to index.html fallback for SPA layout resolution
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Clean reverse-proxy route passing /api (and /api/v1) calls to FastAPI
        location /api {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # Custom corporate gateway timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Custom JSON error page setups
        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            add_header Content-Type application/json;
            return 502 '{"error": true, "message": "Gateway error connecting downstream. Operations state uncertain."}';
        }
    }
}
