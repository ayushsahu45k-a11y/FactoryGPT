version: '3.8'

services:
  # 1. Reverse Proxy Gateway (Nginx) with HTTPS Security Tuning
  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: factory_nginx
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    user: "101:101" # Secure non-root unprivileged nginx user
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Frontend Interface (Vite React Build Hosted on Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory_frontend
    restart: unless-stopped
    user: "101:101" # Runs using unprivileged nginx user process
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--try=1", "--spider", "http://localhost:8080/"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. High-Performance Core API gateway (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_backend
    restart: unless-stopped
    user: "10001:10001" # Runs inside locked down micro-privileged appuser
    expose:
      - "8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-industrial_pass}@postgres:5432/${POSTGRES_DB:-factorygpt}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-f797df77e23a3cb85eb9372d61fe219cfac6ea058e8a8b139db080e7747ebd4b}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # 4. Celery Worker - Predictive failure & anomaly dispatcher
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_celery_worker
    restart: unless-stopped
    command: celery -A backend.app.predictive_maintenance.celery_tasks.celery_app worker --loglevel=info
    user: "10001:10001"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-industrial_pass}@postgres:5432/${POSTGRES_DB:-factorygpt}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-f797df77e23a3cb85eb9372d61fe219cfac6ea058e8a8b139db080e7747ebd4b}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.app.predictive_maintenance.celery_tasks.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 5. Celery Beat - Master operational cron scheduler (e.g., telemetry audits)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_celery_beat
    restart: unless-stopped
    command: celery -A backend.app.predictive_maintenance.celery_tasks.celery_app beat --loglevel=info
    user: "10001:10001"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-industrial_pass}@postgres:5432/${POSTGRES_DB:-factorygpt}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-f797df77e23a3cb85eb9372d61fe219cfac6ea058e8a8b139db080e7747ebd4b}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery beat' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 6. Flower - Real-time active task visual monitor and manager dashboard
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory_flower
    restart: unless-stopped
    command: celery -A backend.app.predictive_maintenance.celery_tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    user: "10001:10001"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-industrial_pass}@postgres:5432/${POSTGRES_DB:-factorygpt}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-f797df77e23a3cb85eb9372d61fe219cfac6ea058e8a8b139db080e7747ebd4b}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 7. Persistent Relational Storage (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: factory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factorygpt}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-industrial_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 8. Redis InMemory Messaging & Celery Backend
  redis:
    image: redis:7-alpine
    container_name: factory_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 9. Performance Metric Scraper (Prometheus)
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: factory_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 10. Visualization Suite Dashboard (Grafana)
  grafana:
    image: grafana/grafana:10.0.3
    container_name: factory_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-factory_admin_pass}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
